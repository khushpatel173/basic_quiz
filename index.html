<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="starting-screen , screen">
        <div class="start-content">
        <h1 id="starting-head">Quiz Time!</h1>
        <br>
        <p id="start-text"> Test your knowledge with these fun quiz</p>
        <br>
        <button id="start-button">Start Quiz</button>
        </div>
</div>
<div class="que-screen , screen">
    <h2 id="que-heading">Question will be displayed here</h2>
    <div class="index">
    <p id="question-index">Question x of 5</p>
    <p id="score-index">Score : x</p>
    </div>
    <br>
    <br>
    <div class="options">
        <button class="opt1 option ">Option1</button>
        <button class="opt2 option">Option2</button>
        <button class="opt3 option">Option3</button>
        <button class="opt4 option">Option4</button>
    <div class="progress-bar">
        <div class="inner-bar"></div>
    </div>
    </div>
   
</div>
<div class="result-screen screen">
    <h1 class="result-heading">Quiz Results</h1>
    <div class="scorecard">
        <div class="result-content">
        <p id="final-score">You Scored x out of 5</p>
        <p id="remarks">Text based on the results</p>
        </div>
    </div>
    <button class="restart-button">Restart Quiz</button>
</div>
<script src="script.js"></script>
</body>
</html>
